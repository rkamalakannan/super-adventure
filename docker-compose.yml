version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DB_URL=postgres://user:pass@postgres:5432/db
      - JWT_SECRET=your-secret
    depends_on:
      - postgres
  frontend:
    build: ./frontend
    ports:
      - "80:80"
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: db
